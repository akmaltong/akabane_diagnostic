<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Akabane Patient</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;background:#0d0d14;color:#e8e8f0;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
.app{max-width:760px;margin:auto;padding:18px}
.card{background:#13131f;border:1px solid #2a2a40;border-radius:20px;padding:18px;margin:14px 0}
.brand{color:#e0b852;font-weight:900;letter-spacing:.08em}
.title{font-size:24px;font-weight:900;margin:8px 0}
.mut{color:#9696b8;line-height:1.5}
textarea{width:100%;box-sizing:border-box;background:#1a1a2a;border:1px solid #2a2a40;border-radius:14px;color:#fff;padding:13px;margin-top:8px;font:inherit;min-height:90px}
.btn{display:block;width:100%;box-sizing:border-box;text-align:center;background:#7c6af7;color:white;border:0;border-radius:14px;padding:14px;margin-top:10px;font-weight:900;text-decoration:none;cursor:pointer}
.diag{padding:14px;border-radius:16px;background:#1a1a2a;border:1px solid #2a2a40;margin-top:10px;cursor:pointer}
.diag-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.diag-details{display:none;margin-top:12px;border-top:1px solid #2a2a40;padding-top:10px}
.diag.open .diag-details{display:block}
.chev{color:#9696b8;font-weight:900;font-size:18px}
.msg{padding:12px;border-radius:14px;background:#1a1a2a;margin-top:8px}
.msg.patient{border-left:3px solid #7c6af7}
.msg.doctor{border-left:3px solid #e0b852}
.pill{display:inline-block;padding:5px 9px;border-radius:8px;margin:3px;font-size:12px;font-weight:800;white-space:nowrap}
.red{background:#351515;color:#ff8b8b}
.blue{background:#15223d;color:#86aaff}
.green{background:#12301d;color:#7be89f}
.err{background:#351515;border:1px solid #743030;color:#ff9b9b;border-radius:12px;padding:10px;margin:10px 0;white-space:pre-wrap}
.table{width:100%;border-collapse:collapse;margin-top:8px}
.table td,.table th{border-bottom:1px solid #2a2a40;padding:8px;text-align:left;font-size:13px;vertical-align:top}
.table th{color:#9696b8}
.section-title{font-size:13px;color:#7c6af7;text-transform:uppercase;font-weight:900;margin-top:12px;margin-bottom:6px}
.small{font-size:13px}
@media(max-width:650px){.app{padding:12px}.table{display:block;overflow-x:auto}.diag-head{display:block}}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="brand">KUNGFU MAN · PATIENT</div>
    <div class="title">Личный кабинет пациента</div>
    <div id="patientInfo" class="mut">Загрузка...</div>
    <div id="status"></div>
  </div>

  <div class="card">
    <div class="title">Мои диагностики</div>
    <div id="diagnostics" class="mut">Загрузка...</div>
  </div>

  <div class="card">
    <div class="title">Сообщения</div>
    <div id="messages"></div>
    <textarea id="msg" placeholder="Написать Акмалу"></textarea>
    <button class="btn" onclick="sendMsg()">Отправить</button>
  </div>
</div>

<script>
const SUPABASE_URL='https://ytalluctuccinghqaotw.supabase.co';
const SUPABASE_KEY='sb_publishable_1rbvxxVRGzBVOYUKbMku4w_jEo8dQxd';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const id=new URLSearchParams(location.search).get('id');

function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function err(s){status.innerHTML='<div class="err">'+esc(s)+'</div>'}
function norm(s){return String(s??'').toLowerCase().replace(/ё/g,'е').trim()}
function isObj(x){return x && typeof x==='object' && !Array.isArray(x)}

function get(o, keys){
  if(!isObj(o)) return '';
  for(const k of keys){
    if(o[k]!==undefined && o[k]!==null && o[k]!=='' ) return o[k];
  }
  return '';
}

function fmtState(v){
  const s=norm(v);
  if(s==='excess'||s==='high'||s==='red'||s==='избыток'||s.includes('изб')) return 'Избыток';
  if(s==='deficiency'||s==='low'||s==='blue'||s==='недостаток'||s.includes('нед')) return 'Недостаток';
  if(s==='normal'||s==='green'||s==='норма'||s.includes('норм')) return 'Норма';
  return v ? String(v) : '—';
}
function stateClass(v){
  const s=fmtState(v);
  if(s==='Избыток') return 'red';
  if(s==='Недостаток') return 'blue';
  if(s==='Норма') return 'green';
  return '';
}

function collectArray(r, names){
  for(const n of names){
    const v=r?.[n] ?? r?.analysis?.[n];
    if(Array.isArray(v)) return v;
  }
  return [];
}

function readableItem(x){
  if(typeof x==='string') return x;
  if(typeof x==='number') return String(x);
  if(!isObj(x)) return '';
  return get(x,['organ','meridian','channel','name','title','label','system']) || JSON.stringify(x);
}

function parseActualRows(r){
  const results = Array.isArray(r.results) ? r.results :
                  Array.isArray(r.measurements) ? r.measurements :
                  Array.isArray(r.rows) ? r.rows :
                  Array.isArray(r.items) ? r.items : [];

  return results.map((x,idx)=>{
    const organ=get(x,['organ','meridian','channel','name','title','label','system']) || readableItem(x) || '—';
    const side=get(x,['side','lr','leftRight','direction','part']) || '';
    const point=get(x,['point','acupoint','code','pointCode','sourcePoint']) || '';
    const time=get(x,['time','seconds','sec','value','duration','t']) || '';
    const state=get(x,['state','status','condition','type','result']) || '';
    return {idx:idx+1, organ, side, point, time, state, raw:x};
  });
}

function rowsFromBuckets(r){
  const excess=collectArray(r,['excess']);
  const deficiency=collectArray(r,['deficiency']);
  const normal=collectArray(r,['normal']);

  const rows=[];
  excess.forEach((x,i)=>rows.push({idx:rows.length+1, organ:readableItem(x), side:get(x,['side','lr','leftRight'])||'', point:get(x,['point','code','treat'])||'', time:get(x,['time','seconds','sec','value'])||'', state:'excess', raw:x}));
  deficiency.forEach((x,i)=>rows.push({idx:rows.length+1, organ:readableItem(x), side:get(x,['side','lr','leftRight'])||'', point:get(x,['point','code','treat'])||'', time:get(x,['time','seconds','sec','value'])||'', state:'deficiency', raw:x}));
  normal.forEach((x,i)=>rows.push({idx:rows.length+1, organ:readableItem(x), side:get(x,['side','lr','leftRight'])||'', point:get(x,['point','code','treat'])||'', time:get(x,['time','seconds','sec','value'])||'', state:'normal', raw:x}));
  return rows;
}

function getRows(r){
  const actual=parseActualRows(r);
  const actualUseful=actual.some(x=>x.state||x.time||x.point);
  if(actual.length && actualUseful) return actual;
  const bucketRows=rowsFromBuckets(r);
  if(bucketRows.length) return bucketRows;
  return actual;
}

function counts(r, rows){
  const excess=collectArray(r,['excess']);
  const deficiency=collectArray(r,['deficiency']);
  const normal=collectArray(r,['normal']);
  const exCount = excess.length || rows.filter(x=>fmtState(x.state)==='Избыток').length || Number(r.excessCount||r.analysis?.excessCount||0);
  const dfCount = deficiency.length || rows.filter(x=>fmtState(x.state)==='Недостаток').length || Number(r.deficiencyCount||r.analysis?.deficiencyCount||0);
  const nmCount = normal.length || rows.filter(x=>fmtState(x.state)==='Норма').length || Number(r.normalCount||r.analysis?.normalCount||0);
  const total = rows.length || Number(r.total||r.analysis?.total||0) || 24;
  return {ex:exCount, df:dfCount, nm:nmCount || Math.max(0,total-exCount-dfCount)};
}

async function load(){
  if(!id){patientInfo.textContent='Нет ID пациента в ссылке.';diagnostics.textContent='';return}
  const p=await sb.from('patients').select('*').eq('id',id).maybeSingle();
  if(p.error){err(p.error.message);return}
  if(!p.data){patientInfo.textContent='Пациент не найден или доступ закрыт.';diagnostics.textContent='';return}
  patientInfo.innerHTML='<b>'+esc(p.data.full_name)+'</b><br>'+esc(p.data.phone||'');

  const d=await sb.from('diagnostics').select('*').eq('patient_id',id).order('created_at',{ascending:false});
  if(d.error) err(d.error.message);
  renderDiags(d.data||[]);

  const m=await sb.from('messages').select('*').eq('patient_id',id).order('created_at',{ascending:true});
  if(m.error) err(m.error.message);
  renderMsgs(m.data||[]);
}

function renderDiags(arr){
  diagnostics.innerHTML=arr.map(x=>{
    const r=x.result_json||{};
    const rows=getRows(r);
    const c=counts(r,rows);

    const tableRows=rows.map((y,idx)=>{
      const timeText=(y.time===undefined||y.time===null||y.time==='')?'—':`${esc(y.time)}с`;
      const stateText=fmtState(y.state);
      return `<tr>
        <td>${idx+1}</td>
        <td>${esc(y.organ||'—')}</td>
        <td>${esc(y.side||'—')}</td>
        <td>${esc(y.point||'—')}</td>
        <td>${timeText}</td>
        <td><span class="pill ${stateClass(y.state)}">${esc(stateText)}</span></td>
      </tr>`;
    }).join('');

    const protocol=r.protocol||r.patientProtocol||r.recommendation||r.summary||'';

    return `<div class="diag" onclick="toggleDiag(this)">
      <div class="diag-head">
        <div>
          <b>${new Date(x.created_at).toLocaleString()}</b>
          <div class="mut">${esc(r.patientName||r.patient||'Диагностика Акабане')}</div>
        </div>
        <div class="chev">⌄</div>
      </div>

      <div>
        <span class="pill red">Избыток ${c.ex}</span>
        <span class="pill blue">Недостаток ${c.df}</span>
        <span class="pill green">Норма ${c.nm}</span>
      </div>

      <div class="diag-details">
        ${protocol?`<div class="section-title">Итог</div><div class="mut">${esc(protocol)}</div>`:''}
        <div class="section-title">Измерения</div>
        ${tableRows?`<table class="table"><tr><th>№</th><th>Меридиан</th><th>Сторона</th><th>Точка</th><th>Время</th><th>Состояние</th></tr>${tableRows}</table>`:`<div class="mut small">В этой записи нет массива измерений. Сводка сохранена, но детали не были переданы из диагностики.</div>`}
      </div>
    </div>`;
  }).join('')||'Диагностик пока нет';
}

function toggleDiag(el){el.classList.toggle('open')}

function renderMsgs(arr){
  messages.innerHTML=arr.map(m=>`<div class="msg ${esc(m.author)}"><b>${m.author==='patient'?'Пациент':'Акмал'}</b><div>${esc(m.message)}</div><div class="mut">${new Date(m.created_at).toLocaleString()}</div></div>`).join('')||'<div class="mut">Сообщений пока нет</div>';
}

async function sendMsg(){
  const text=msg.value.trim(); if(!text||!id)return;
  const r=await sb.from('messages').insert({patient_id:id,author:'patient',message:text});
  if(r.error)return err(r.error.message);
  msg.value=''; load();
}
load();
</script>
</body>
</html>
