<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Akabane · Patient</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../shared/config.js"></script>
  <style>
    :root{--bg:#0d0d14;--bg2:#13131f;--bg3:#1a1a2a;--line:#2a2a40;--txt:#e8e8f0;--mut:#9090b0;--gold:#e0b852;--violet:#7c6af7}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,sans-serif}.app{max-width:760px;margin:0 auto;padding:18px}.hero,.card{background:var(--bg2);border:1px solid var(--line);border-radius:22px;padding:20px;margin-bottom:14px}.k{color:var(--gold);font-weight:900;letter-spacing:.08em}.title{font-size:24px;font-weight:900;margin:8px 0}.mut{color:var(--mut);line-height:1.6}.btn{border:0;background:var(--violet);color:#fff;border-radius:12px;padding:12px 14px;font-weight:800;cursor:pointer}.btn2{background:var(--bg3);border:1px solid var(--line);color:var(--txt)}input,textarea{width:100%;background:var(--bg3);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:12px;font:inherit}textarea{min-height:90px}.item{padding:14px;border:1px solid var(--line);background:var(--bg3);border-radius:16px;margin:8px 0}.msg{padding:10px 12px;border-radius:12px;background:var(--bg3);margin:8px 0}.msg.doctor{border-left:3px solid var(--gold)}.msg.patient{border-left:3px solid var(--violet)}pre{white-space:pre-wrap;word-break:break-word}
  </style>
</head>
<body>
<div class="app">
  <section class="hero">
    <div class="k">KUNGFU MAN · PATIENT</div>
    <div class="title" id="patientName">Личный кабинет пациента</div>
    <div class="mut" id="patientSub">Загрузка...</div>
  </section>
  <section class="card">
    <div class="title">Мои диагностики</div>
    <div id="diagnostics"></div>
  </section>
  <section class="card">
    <div class="title">Сообщения</div>
    <div id="messages"></div>
    <textarea id="msgText" placeholder="Написать Акмалу"></textarea>
    <button class="btn" style="width:100%;margin-top:8px" onclick="sendMessage()">Отправить</button>
  </section>
</div>
<script>
const cfg=window.APP_CONFIG||{}; const sb=window.supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);
const id=new URLSearchParams(location.search).get('id'); let patient=null;
function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function summary(x){if(!x)return 'Без данных'; if(typeof x==='string')return x; return x.text||x.summary||JSON.stringify(x,null,2)}
async function load(){if(!id){patientSub.textContent='Нет ID пациента в ссылке. Откройте персональную ссылку от специалиста.';return} const p=await sb.from('patients').select('*').eq('id',id).single(); if(p.error){patientSub.textContent='Пациент не найден или доступ закрыт.';return} patient=p.data; patientName.textContent=patient.full_name; patientSub.textContent='Ваши результаты, рекомендации и связь со специалистом.'; await Promise.all([loadDiagnostics(),loadMessages()])}
async function loadDiagnostics(){const {data,error}=await sb.from('diagnostics').select('*').eq('patient_id',id).order('created_at',{ascending:false}); diagnostics.innerHTML=(data||[]).map(d=>`<div class="item"><b>${new Date(d.created_at).toLocaleString()}</b><pre>${esc(summary(d.result_json))}</pre></div>`).join('')||'<div class="mut">Диагностик пока нет.</div>'}
async function loadMessages(){const {data}=await sb.from('messages').select('*').eq('patient_id',id).order('created_at',{ascending:true}); messages.innerHTML=(data||[]).map(m=>`<div class="msg ${m.author}"><b>${m.author==='doctor'?'Акмал':'Вы'}</b><div>${esc(m.message)}</div><div class="mut">${new Date(m.created_at).toLocaleString()}</div></div>`).join('')||'<div class="mut">Сообщений пока нет.</div>'}
async function sendMessage(){const t=msgText.value.trim(); if(!t||!id)return; const {error}=await sb.from('messages').insert({patient_id:id,author:'patient',message:t}); if(error)return alert(error.message); msgText.value=''; loadMessages()}
load();
</script>
</body>
</html>
