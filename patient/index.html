<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Akabane Patient</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0d0d14;
  --card:#13131f;
  --card2:#1a1a2a;
  --line:#2a2a40;
  --mut:#9696b8;
  --text:#e8e8f0;
  --gold:#e0b852;
  --violet:#7c6af7;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,sans-serif}
.app{max-width:820px;margin:auto;padding:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;margin:14px 0}
.brand{color:var(--gold);font-weight:900;letter-spacing:.08em;text-transform:uppercase}
.title{font-size:24px;font-weight:950;margin:8px 0}
.mut{color:var(--mut);line-height:1.5}
.small{font-size:13px}
.btn{display:block;width:100%;text-align:center;background:var(--violet);color:white;border:0;border-radius:14px;padding:14px;margin-top:10px;font-weight:900;text-decoration:none;cursor:pointer}
.btn2{background:#1a1a2a;border:1px solid var(--line)}
textarea{width:100%;background:#1a1a2a;border:1px solid var(--line);border-radius:14px;color:#fff;padding:13px;margin-top:8px;font:inherit;min-height:90px}
input[type=file]{width:100%;margin-top:8px;color:#cfcfff}
.msg{padding:12px;border-radius:14px;background:#1a1a2a;margin-top:8px}
.msg.patient{border-left:3px solid var(--violet)}
.msg.doctor{border-left:3px solid var(--gold)}
.file-link{display:inline-block;margin-top:8px;color:#f4d184;text-decoration:none;border:1px solid rgba(224,184,82,.35);border-radius:10px;padding:7px 10px}
.err{background:#351515;border:1px solid #743030;color:#ff9b9b;border-radius:12px;padding:10px;margin:10px 0}
.ok{background:#12301d;border:1px solid #247548;color:#7be89f;border-radius:12px;padding:10px;margin:10px 0}

.offer{background:linear-gradient(180deg,#171423,#11111a);border:1px solid rgba(224,184,82,.35);border-radius:22px;margin:18px 0;padding:20px}
.offer-top{display:flex;justify-content:space-between;gap:12px;cursor:pointer}
.offer h2{margin:8px 0;font-size:28px;line-height:1.1}
.price{color:var(--gold);font-size:34px;font-weight:950;margin-top:14px}
.caret{color:var(--gold);font-size:20px;font-weight:900}
.offer-body{display:none;border-top:1px solid rgba(224,184,82,.22);margin-top:18px;padding-top:18px}
.offer.open .offer-body{display:block}
.pay-card{border:1px solid rgba(224,184,82,.38);border-radius:18px;padding:18px;background:radial-gradient(circle at 85% 10%,rgba(124,106,247,.25),transparent 35%),linear-gradient(135deg,#171225,#0d0d14);min-height:145px}
.chip{width:52px;height:38px;border-radius:8px;background:linear-gradient(135deg,#f0c45c,#9c762d);margin-bottom:26px}
.card-number{font-size:25px;letter-spacing:.12em;font-weight:900;color:#fff;word-spacing:.25em}
.card-owner{margin-top:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;font-size:13px}
.copy-row{display:grid;grid-template-columns:1fr 180px;gap:10px;margin-top:12px}

.diag-item{background:#1a1a2a;border:1px solid var(--line);border-radius:16px;padding:14px;margin-top:10px}
.diag-head{display:flex;justify-content:space-between;gap:12px;cursor:pointer}
.badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.badge{display:inline-block;border-radius:10px;padding:7px 10px;font-size:13px;font-weight:900;white-space:nowrap}
.excess{background:#471818;color:#ff9b9b}
.normal{background:#12301d;color:#7be89f}
.deficiency{background:#10244a;color:#8dbaff}
.severe{background:#4b250b;color:#ffb56a}
.diag-body{display:none;border-top:1px solid var(--line);margin-top:14px;padding-top:14px}
.diag-item.open .diag-body{display:block}
.summary-box{border:1px solid var(--line);border-radius:16px;padding:14px;background:#10101a;line-height:1.55;margin-bottom:14px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:640px}
th,td{text-align:left;border-bottom:1px solid var(--line);padding:11px 8px;font-size:14px;color:#c8c8ee}
th{color:#aaa7d8;font-size:12px;text-transform:uppercase;letter-spacing:.05em}
.no-id{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:24px}
@media(max-width:650px){
  .app{padding:12px}
  .card{padding:16px}
  .offer h2{font-size:24px}
  .price{font-size:30px}
  .copy-row{grid-template-columns:1fr}
  .card-number{font-size:20px}
  th,td{font-size:13px}
}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="brand">KUNGFU MAN · PATIENT</div>
    <div class="title">Личный кабинет пациента</div>
    <div id="patientInfo" class="mut">Загрузка...</div>
    <div id="status"></div>
  </div>

  <div class="card">
    <div class="title">Мои диагностики</div>
    <div id="diagnostics" class="mut">Загрузка...</div>
  </div>

  <div class="offer" id="offerBox">
    <div class="offer-top" onclick="toggleOffer()">
      <div>
        <div class="brand">Лучший способ начать</div>
        <h2>3 сеанса терапии</h2>
        <div class="mut">Диагностика в подарок</div>
        <div class="price">900 сомони</div>
        <div class="mut small">3 терапевтических сеанса · 90 минут каждый</div>
      </div>
      <div class="caret" id="offerCaret">∨</div>
    </div>

    <div class="offer-body">
      <div class="pay-card">
        <div class="chip"></div>
        <div class="card-number" id="cardNumber">4439 2000 2119 9871</div>
        <div class="card-owner">AMIR OCHILOV</div>
      </div>
      <div class="copy-row">
        <button class="btn btn2" onclick="copyCard()">Скопировать карту</button>
        <button class="btn btn2" onclick="scrollToChat()">Отправить чек</button>
      </div>
    </div>
  </div>

  <div class="card" id="chatCard">
    <div class="title">Сообщения</div>
    <div id="messages"></div>
    <textarea id="msg" placeholder="Написать Акмалу"></textarea>
    <input id="file" type="file">
    <button class="btn" onclick="sendMsg()">Отправить</button>
  </div>
</div>

<script>
const SUPABASE_URL='https://ytalluctuccinghqaotw.supabase.co';
const SUPABASE_KEY='sb_publishable_1rbvxxVRGzBVOYUKbMku4w_jEo8dQxd';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const id=new URLSearchParams(location.search).get('id');

function esc(s){
  return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}
function err(s){
  document.getElementById('status').innerHTML='<div class="err">'+esc(s)+'</div>';
}
function ok(s){
  document.getElementById('status').innerHTML='<div class="ok">'+esc(s)+'</div>';
  setTimeout(()=>document.getElementById('status').innerHTML='',2500);
}
function toggleOffer(){
  const box=document.getElementById('offerBox');
  box.classList.toggle('open');
  document.getElementById('offerCaret').textContent=box.classList.contains('open')?'∧':'∨';
}
function copyCard(){
  const card=document.getElementById('cardNumber').textContent.trim();
  navigator.clipboard?.writeText(card);
  ok('Номер карты скопирован');
}
function scrollToChat(){
  document.getElementById('chatCard').scrollIntoView({behavior:'smooth',block:'start'});
}

/* ЖЁСТКАЯ ШКАЛА АКАБАНЕ
   0–4  = Избыток энергии
   5–7  = Норма
   8–13 = Недостаток энергии
   14+  = Выраженный недостаток
*/
function classifyByTime(t){
  const n=Number(t);
  if(Number.isNaN(n)) return '—';
  if(n>=0 && n<=4) return 'Избыток энергии';
  if(n>=5 && n<=7) return 'Норма';
  if(n>=8 && n<=13) return 'Недостаток энергии';
  if(n>=14) return 'Выраженный недостаток';
  return '—';
}
function statusClass(status){
  status=String(status);
  if(status.includes('Избыток')) return 'excess';
  if(status.includes('Норма')) return 'normal';
  if(status.includes('Выраженный')) return 'severe';
  if(status.includes('Недостаток')) return 'deficiency';
  return '';
}
function fallbackStatus(raw){
  const s=String(raw??'').trim().toLowerCase();
  if(['excess','izbytok','high','hyper','избыток','избыток энергии'].includes(s)) return 'Избыток энергии';
  if(['normal','norm','norma','норма'].includes(s)) return 'Норма';
  if(['deficiency','low','hypo','nedostatok','недостаток','недостаток энергии'].includes(s)) return 'Недостаток энергии';
  if(['severe','severe_deficiency','expressed_deficiency','critical','выраженный недостаток'].includes(s)) return 'Выраженный недостаток';
  return raw ? String(raw) : '—';
}
function parseTime(v){
  if(v===undefined || v===null || v==='') return null;
  if(typeof v==='number' && !Number.isNaN(v)) return v;
  if(typeof v==='string'){
    const m=v.replace(',','.').match(/-?\d+(?:\.\d+)?/);
    if(m){
      const n=parseFloat(m[0]);
      return Number.isNaN(n)?null:n;
    }
  }
  if(typeof v==='object'){
    const keys=['reaction_time','time','seconds','sec','value','count','duration','text','label'];
    for(const k of keys){
      if(v[k]!==undefined){
        const n=parseTime(v[k]);
        if(n!==null) return n;
      }
    }
  }
  return null;
}
function getTime(row){
  const keys=[
    'reaction_time','time','seconds','sec','value','count','countSeconds','duration',
    'burnTime','burn_time','moxaTime','moxa_time',
    'timeSec','time_sec','secondsCount','seconds_count',
    'warmTime','warm_time','heatingTime','heating_time',
    'burn','moxa','timer','secondsText','timeText','displayTime',
    'timeLabel','durationText','resultTime','t'
  ];
  for(const k of keys){
    if(row && row[k]!==undefined){
      const n=parseTime(row[k]);
      if(n!==null) return n;
    }
  }
  return null;
}
function getRows(raw){
  let r=raw||{};
  if(typeof r==='string'){
    try{r=JSON.parse(r)}catch(e){r={}};
  }
  if(Array.isArray(r)) return r;
  const candidates=[
    r.measurements,r.rows,r.points,r.data,r.results,r.items,
    r.result,r.values,r.meridians,r.channels
  ];
  for(const c of candidates){
    if(Array.isArray(c)) return c;
  }
  if(r.norm && Array.isArray(r.norm.measurements)) return r.norm.measurements;
  return [];
}
function normalizeRow(x,i){
  const time=getTime(x);
  const rawStatus=x.status||x.state||x.condition||x.result||x.category||x.type;
  const status=time!==null ? classifyByTime(time) : fallbackStatus(rawStatus);
  return {
    n:x.n||x.num||x.number||x.index||(i+1),
    meridian:x.meridian||x.channel||x.name||x.organ||x.title||'—',
    side:x.side||x.hand||x.leg||x.position||'—',
    point:x.point||x.acupoint||x.code||x.pointCode||x.point_code||'—',
    time,
    status
  };
}
function normalizeDiagnostic(raw){
  const rows=getRows(raw).map(normalizeRow);
  const counts={excess:0,normal:0,deficiency:0,severe:0};
  rows.forEach(r=>{
    if(r.status.includes('Избыток')) counts.excess++;
    else if(r.status.includes('Норма')) counts.normal++;
    else if(r.status.includes('Выраженный')) counts.severe++;
    else if(r.status.includes('Недостаток')) counts.deficiency++;
  });
  return {rows,counts};
}
function conclusion(rows,counts){
  if(!rows.length) return '';
  let dominant='смешанная картина';
  const max=Math.max(counts.excess,counts.normal,counts.deficiency,counts.severe);
  if(max===counts.excess) dominant='преобладает избыток энергии';
  else if(max===counts.normal) dominant='показатели преимущественно в норме';
  else if(max===counts.deficiency) dominant='преобладает недостаток энергии';
  else if(max===counts.severe) dominant='есть выраженный недостаток энергии';

  const excess=rows.filter(r=>r.status.includes('Избыток')).map(r=>`${r.meridian} (${r.side})`);
  const deficiency=rows.filter(r=>r.status.includes('Недостаток')).map(r=>`${r.meridian} (${r.side})`);

  return `<div class="summary-box">
    <b>Заключение</b><br>
    По результатам диагностики: ${dominant}.
    ${excess.length?`<br><br><b>Избыток:</b> ${esc(excess.join(', '))}`:''}
    ${deficiency.length?`<br><b>Недостаток:</b> ${esc(deficiency.join(', '))}`:''}
  </div>`;
}
function renderDiagnostics(items){
  const box=document.getElementById('diagnostics');
  if(!items || !items.length){
    box.innerHTML='Диагностик пока нет';
    return;
  }

  box.innerHTML=items.map(item=>{
    const d=normalizeDiagnostic(item.result_json);
    const c=d.counts;
    const rows=d.rows;

    const body=rows.length ? `
      ${conclusion(rows,c)}
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>№</th><th>Меридиан</th><th>Сторона</th><th>Точка</th><th>Время</th><th>Состояние</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r=>`<tr>
              <td>${esc(r.n)}</td>
              <td>${esc(r.meridian)}</td>
              <td>${esc(r.side)}</td>
              <td>${esc(r.point)}</td>
              <td>${r.time===null?'—':esc(Number(r.time).toFixed(1)+' с')}</td>
              <td><span class="badge ${statusClass(r.status)}">${esc(r.status)}</span></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    ` : '<div class="mut">Подробные измерения не найдены в результате.</div>';

    return `<div class="diag-item" onclick="toggleDiag(event,this)">
      <div class="diag-head">
        <div>
          <b>${new Date(item.created_at).toLocaleString()}</b>
          <div class="mut">Диагностика Акабане</div>
          <div class="badges">
            <span class="badge excess">Избыток ${c.excess}</span>
            <span class="badge normal">Норма ${c.normal}</span>
            <span class="badge deficiency">Недостаток ${c.deficiency}</span>
            <span class="badge severe">Выраженный ${c.severe}</span>
          </div>
        </div>
        <div class="caret">∨</div>
      </div>
      <div class="diag-body">${body}</div>
    </div>`;
  }).join('');
}
function toggleDiag(e,el){
  if(e.target.closest('a')||e.target.closest('button')) return;
  el.classList.toggle('open');
}

async function uploadFile(file){
  if(!file) return {};
  const safe=file.name.replace(/[^\w.\-а-яА-ЯёЁ]/g,'_');
  const path=`patient/${id}/${Date.now()}_${safe}`;
  const up=await sb.storage.from('chat-files').upload(path,file,{upsert:false});
  if(up.error) throw up.error;
  const pub=sb.storage.from('chat-files').getPublicUrl(path);
  return {file_url:pub.data.publicUrl,file_name:file.name,file_type:file.type};
}
function renderMsgs(arr){
  const box=document.getElementById('messages');
  box.innerHTML=arr.map(m=>`<div class="msg ${esc(m.author)}">
    <b>${m.author==='patient'?'Пациент':'Акмал'}</b>
    <div>${esc(m.message||'')}</div>
    ${m.file_url?`<a class="file-link" href="${esc(m.file_url)}" target="_blank">📎 ${esc(m.file_name||'Файл')}</a>`:''}
    <div class="mut small">${new Date(m.created_at).toLocaleString()}</div>
  </div>`).join('') || '<div class="mut">Сообщений пока нет</div>';
}
async function sendMsg(){
  const text=document.getElementById('msg').value.trim();
  const f=document.getElementById('file').files[0];
  if(!text && !f){err('Введите сообщение или прикрепите файл');return;}
  try{
    const uploaded=await uploadFile(f);
    const r=await sb.from('messages').insert({patient_id:id,author:'patient',message:text,...uploaded});
    if(r.error) throw r.error;
    document.getElementById('msg').value='';
    document.getElementById('file').value='';
    await load();
  }catch(e){err(e.message||e)}
}
async function load(){
  try{
    if(!id){
      document.querySelector('.app').innerHTML='<div class="no-id"><h2>Личный кабинет</h2><p class="mut">Страница открывается по персональной ссылке специалиста.</p></div>';
      return;
    }

    const p=await sb.from('patients').select('*').eq('id',id).maybeSingle();
    if(p.error) throw p.error;
    if(!p.data){
      document.getElementById('patientInfo').textContent='Пациент не найден или доступ закрыт.';
      document.getElementById('diagnostics').textContent='Диагностик пока нет';
      renderMsgs([]);
      return;
    }

    document.getElementById('patientInfo').innerHTML='<b>'+esc(p.data.full_name)+'</b>'+(p.data.phone?'<br>'+esc(p.data.phone):'');

    const d=await sb.from('diagnostics').select('*').eq('patient_id',id).order('created_at',{ascending:false});
    if(d.error) throw d.error;
    renderDiagnostics(d.data||[]);

    const m=await sb.from('messages').select('*').eq('patient_id',id).order('created_at',{ascending:true});
    if(m.error) throw m.error;
    renderMsgs(m.data||[]);
  }catch(e){
    err(e.message||e);
    document.getElementById('diagnostics').textContent='Диагностик пока нет';
  }
}
load();

// Realtime — сообщения от врача и диагностики появляются мгновенно
try{
  if(id){
    const sbRT=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    sbRT.channel('patient-rt-'+id)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'patient_id=eq.'+id},()=>load())
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'diagnostics',filter:'patient_id=eq.'+id},()=>load())
      .subscribe();
  }
}catch(e){console.warn('Realtime недоступен:',e)}

// Fallback polling каждые 30с
setInterval(load,30000);
</script>
</body>
</html>
