<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Akabane Patient</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
body{margin:0;background:#0d0d14;color:#e8e8f0;font-family:system-ui,-apple-system,Segoe UI,sans-serif}.app{max-width:820px;margin:auto;padding:18px}.card{background:#13131f;border:1px solid #2a2a40;border-radius:20px;padding:18px;margin:14px 0}.brand{color:#e0b852;font-weight:900;letter-spacing:.08em}.title{font-size:24px;font-weight:900;margin:8px 0}.mut{color:#9696b8;line-height:1.5}textarea{width:100%;box-sizing:border-box;background:#1a1a2a;border:1px solid #2a2a40;border-radius:14px;color:#fff;padding:13px;margin-top:8px;font:inherit;min-height:90px}.btn{display:block;width:100%;box-sizing:border-box;text-align:center;background:#7c6af7;color:white;border:0;border-radius:14px;padding:14px;margin-top:10px;font-weight:900;text-decoration:none;cursor:pointer}.btn2{background:#1a1a2a;border:1px solid #2a2a40}.msg{padding:12px;border-radius:14px;background:#1a1a2a;margin-top:8px}.msg.patient{border-left:3px solid #7c6af7}.msg.doctor{border-left:3px solid #e0b852}.file-link{display:inline-block;margin-top:8px;color:#f4d184;text-decoration:none;border:1px solid rgba(224,184,82,.35);border-radius:10px;padding:7px 10px}.err{background:#351515;border:1px solid #743030;color:#ff9b9b;border-radius:12px;padding:10px;margin:10px 0}.pay{background:linear-gradient(180deg,#171423,#11111a);border:1px solid rgba(224,184,82,.35);border-radius:22px;margin:18px 0;padding:20px}.gold{color:#e0b852}.no-id{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:24px}</style></head>
<body><div class="app"><div class="card"><div class="brand">KUNGFU MAN · PATIENT</div><div class="title">Личный кабинет пациента</div><div id="patientInfo" class="mut">Загрузка...</div><div id="status"></div></div><div class="card"><div class="title">Мои диагностики</div><div id="diagnostics" class="mut">Загрузка...</div><a id="newDiag" class="btn btn2" href="#">Открыть диагностику</a></div><div class="pay"><div class="gold">Лучший способ начать</div><div class="title">3 сеанса терапии</div><div class="mut">+ диагностика в подарок · 90 минут каждый сеанс</div><div style="margin-top:12px"><b class="gold" style="font-size:32px">900 сомони</b></div><div class="mut">После оплаты отправьте чек файлом в чат ниже.</div></div><div class="card"><div class="title">Сообщения</div><div id="messages"></div><textarea id="msg" placeholder="Написать Акмалу"></textarea><input id="file" type="file"><button class="btn" onclick="sendMsg()">Отправить</button></div></div>
<script>
const SUPABASE_URL='https://ytalluctuccinghqaotw.supabase.co',SUPABASE_KEY='sb_publishable_1rbvxxVRGzBVOYUKbMku4w_jEo8dQxd',sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY),id=new URLSearchParams(location.search).get('id');function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function err(s){status.innerHTML='<div class="err">'+esc(s)+'</div>'}async function uploadFile(file){if(!file)return{};const safe=file.name.replace(/[^\w.\-а-яА-ЯёЁ]/g,'_'),path=`patient/${id}/${Date.now()}_${safe}`;const up=await sb.storage.from('chat-files').upload(path,file,{upsert:false});if(up.error)throw up.error;const pub=sb.storage.from('chat-files').getPublicUrl(path);return{file_url:pub.data.publicUrl,file_name:file.name,file_type:file.type}}
async function load(){if(!id){document.querySelector('.app').innerHTML='<div class="no-id"><h2>Личный кабинет</h2><p class="mut">Страница открывается по персональной ссылке специалиста.</p></div>';return}const p=await sb.from('patients').select('*').eq('id',id).maybeSingle();if(p.error){err(p.error.message);return}if(!p.data){patientInfo.textContent='Пациент не найден или доступ закрыт.';return}patientInfo.innerHTML='<b>'+esc(p.data.full_name)+'</b><br>'+esc(p.data.phone||'');newDiag.href='../doctor/?patient_id='+encodeURIComponent(id)+'&patient_name='+encodeURIComponent(p.data.full_name||'');const d=await sb.from('diagnostics').select('*').eq('patient_id',id).order('created_at',{ascending:false});diagnostics.innerHTML=(d.data||[]).map(x=>'<div class="msg"><b>'+new Date(x.created_at).toLocaleString()+'</b><div class="mut">Диагностика Акабане</div></div>').join('')||'Диагностик пока нет';const m=await sb.from('messages').select('*').eq('patient_id',id).order('created_at',{ascending:true});renderMsgs(m.data||[])}
function renderMsgs(arr){messages.innerHTML=arr.map(m=>`<div class="msg ${esc(m.author)}"><b>${m.author==='patient'?'Пациент':'Акмал'}</b><div>${esc(m.message||'')}</div>${m.file_url?`<a class="file-link" href="${esc(m.file_url)}" target="_blank">📎 ${esc(m.file_name||'Файл')}</a>`:''}<div class="mut">${new Date(m.created_at).toLocaleString()}</div></div>`).join('')||'<div class="mut">Сообщений пока нет</div>'}
async function sendMsg(){const text=msg.value.trim(),f=file.files[0];if(!text&&!f){err('Введите сообщение или прикрепите файл');return}try{const uploaded=await uploadFile(f);const r=await sb.from('messages').insert({patient_id:id,author:'patient',message:text,...uploaded});if(r.error)throw r.error;msg.value='';file.value='';await load()}catch(e){err(e.message||e)}}load();setInterval(load,10000);
</script></body></html>
