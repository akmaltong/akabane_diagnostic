<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Akabane Patient</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;background:#0d0d14;color:#e8e8f0;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
.app{max-width:760px;margin:auto;padding:18px}
.card{background:#13131f;border:1px solid #2a2a40;border-radius:20px;padding:18px;margin:14px 0}
.brand{color:#e0b852;font-weight:900;letter-spacing:.08em}
.title{font-size:24px;font-weight:900;margin:8px 0}
.mut{color:#9696b8;line-height:1.5}
textarea{width:100%;box-sizing:border-box;background:#1a1a2a;border:1px solid #2a2a40;border-radius:14px;color:#fff;padding:13px;margin-top:8px;font:inherit;min-height:90px}
.btn{display:block;width:100%;box-sizing:border-box;text-align:center;background:#7c6af7;color:white;border:0;border-radius:14px;padding:14px;margin-top:10px;font-weight:900;text-decoration:none;cursor:pointer}
.diag{padding:14px;border-radius:16px;background:#1a1a2a;border:1px solid #2a2a40;margin-top:10px;cursor:pointer}
.diag-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.diag-details{display:none;margin-top:12px;border-top:1px solid #2a2a40;padding-top:10px}
.diag.open .diag-details{display:block}
.chev{color:#9696b8;font-weight:900;font-size:18px}
.msg{padding:12px;border-radius:14px;background:#1a1a2a;margin-top:8px}
.msg.patient{border-left:3px solid #7c6af7}
.msg.doctor{border-left:3px solid #e0b852}
.pill{display:inline-block;padding:5px 9px;border-radius:8px;margin:3px;font-size:12px;font-weight:800;white-space:nowrap}
.red{background:#351515;color:#ff8b8b}
.blue{background:#15223d;color:#86aaff}
.green{background:#12301d;color:#7be89f}
.err{background:#351515;border:1px solid #743030;color:#ff9b9b;border-radius:12px;padding:10px;margin:10px 0;white-space:pre-wrap}
.table{width:100%;border-collapse:collapse;margin-top:8px}
.table td,.table th{border-bottom:1px solid #2a2a40;padding:8px;text-align:left;font-size:13px;vertical-align:top}
.table th{color:#9696b8}
.section-title{font-size:13px;color:#7c6af7;text-transform:uppercase;font-weight:900;margin-top:12px;margin-bottom:6px}
.small{font-size:13px}
@media(max-width:650px){.app{padding:12px}.table{display:block;overflow-x:auto}.diag-head{display:block}}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="brand">KUNGFU MAN · PATIENT</div>
    <div class="title">Личный кабинет пациента</div>
    <div id="patientInfo" class="mut">Загрузка...</div>
    <div id="status"></div>
  </div>

  <div class="card">
    <div class="title">Мои диагностики</div>
    <div id="diagnostics" class="mut">Загрузка...</div>
  </div>

  <div class="card">
    <div class="title">Сообщения</div>
    <div id="messages"></div>
    <textarea id="msg" placeholder="Написать Акмалу"></textarea>
    <button class="btn" onclick="sendMsg()">Отправить</button>
  </div>
</div>

<script>
const SUPABASE_URL='https://ytalluctuccinghqaotw.supabase.co';
const SUPABASE_KEY='sb_publishable_1rbvxxVRGzBVOYUKbMku4w_jEo8dQxd';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const id=new URLSearchParams(location.search).get('id');

const ORDER=[
  ['Лёгкие','Левая'],['Лёгкие','Правая'],
  ['Толстая кишка','Левая'],['Толстая кишка','Правая'],
  ['Желудок','Левая'],['Желудок','Правая'],
  ['Селезёнка/Поджелудочная','Левая'],['Селезёнка/Поджелудочная','Правая'],
  ['Сердце','Левая'],['Сердце','Правая'],
  ['Тонкая кишка','Левая'],['Тонкая кишка','Правая'],
  ['Мочевой пузырь','Левая'],['Мочевой пузырь','Правая'],
  ['Почки','Левая'],['Почки','Правая'],
  ['Перикард','Левая'],['Перикард','Правая'],
  ['Тройной обогреватель','Левая'],['Тройной обогреватель','Правая'],
  ['Жёлчный пузырь','Левая'],['Жёлчный пузырь','Правая'],
  ['Печень','Левая'],['Печень','Правая']
];

function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function err(s){status.innerHTML='<div class="err">'+esc(s)+'</div>'}

function norm(s){
  return String(s||'')
    .toLowerCase()
    .replace(/ё/g,'е')
    .replace(/\s+/g,' ')
    .trim();
}

function sameSide(a,b){
  const x=norm(a), y=norm(b);
  if(!x||!y) return false;
  if(x===y) return true;
  if((x==='л'||x.includes('лев')) && (y==='л'||y.includes('лев'))) return true;
  if((x==='п'||x.includes('прав')) && (y==='п'||y.includes('прав'))) return true;
  return false;
}

function sameOrgan(a,b){
  const x=norm(a), y=norm(b);
  if(!x||!y) return false;
  if(x===y) return true;
  if(x.includes('селез') && y.includes('селез')) return true;
  if(x.includes('поджел') && y.includes('поджел')) return true;
  if(x.includes('желч') && y.includes('желч')) return true;
  if(x.includes('мочев') && y.includes('мочев')) return true;
  if(x.includes('трой') && y.includes('трой')) return true;
  if(x.includes('толст') && y.includes('толст')) return true;
  if(x.includes('тонк') && y.includes('тонк')) return true;
  return false;
}

function getField(o,names){
  if(!o) return '';
  for(const k of names){
    if(o[k]!==undefined && o[k]!==null && o[k]!=='') return o[k];
  }
  return '';
}

function itemOrgan(o){return getField(o,['organ','meridian','name','channel','title','system'])}
function itemSide(o){return getField(o,['side','lr','leftRight','direction','hand','leg'])}
function itemPoint(o){return getField(o,['point','acupoint','code','pointCode','treat','sourcePoint'])}
function itemTime(o){return getField(o,['time','seconds','sec','value','duration'])}

function fmtState(state){
  if(state==='excess') return 'Избыток';
  if(state==='deficiency') return 'Недостаток';
  if(state==='normal') return 'Норма';
  if(state==='Избыток') return 'Избыток';
  if(state==='Недостаток') return 'Недостаток';
  if(state==='Норма') return 'Норма';
  return state || '—';
}

function stateClass(state){
  const s=norm(state);
  if(s==='excess'||s==='избыток') return 'red';
  if(s==='deficiency'||s==='недостаток') return 'blue';
  if(s==='normal'||s==='норма') return 'green';
  return '';
}

function itemMatches(item, organ, side){
  if(!item) return false;
  return sameOrgan(itemOrgan(item), organ) && (!side || sameSide(itemSide(item), side));
}

function stateFromBuckets(organ, side, buckets){
  if(buckets.excess.some(x=>itemMatches(x,organ,side))) return 'excess';
  if(buckets.deficiency.some(x=>itemMatches(x,organ,side))) return 'deficiency';
  if(buckets.normalArr.some(x=>itemMatches(x,organ,side))) return 'normal';
  return 'normal';
}

function findResult(organ, side, results){
  return results.find(x=>itemMatches(x,organ,side)) || null;
}

function getAnalysis(r){
  const a=r.analysis||{};
  const results=Array.isArray(r.results)?r.results:[];
  const rawEx=a.excess||r.excess||[];
  const rawDf=a.deficiency||r.deficiency||[];
  const rawNm=a.normal||r.normal||[];

  const computedEx=results.filter(y=>norm(y.state)==='excess'||norm(y.state)==='избыток');
  const computedDf=results.filter(y=>norm(y.state)==='deficiency'||norm(y.state)==='недостаток');
  const computedNm=results.filter(y=>norm(y.state)==='normal'||norm(y.state)==='норма');

  const excess=rawEx.length?rawEx:computedEx;
  const deficiency=rawDf.length?rawDf:computedDf;
  const normalArr=rawNm.length?rawNm:computedNm;

  const total=results.length || excess.length + deficiency.length + normalArr.length || 24;
  const normal=normalArr.length || Math.max(0,total-excess.length-deficiency.length);

  return {results,excess,deficiency,normalArr,normal,total};
}

function makeRows(r, an){
  const results=an.results||[];
  const hasUsefulResults=results.some(x=>itemTime(x)||itemPoint(x)||x.state||x.status);
  const sourceRows=results.length ? results.map(x=>[itemOrgan(x), itemSide(x), x]) : ORDER.map(x=>[x[0],x[1],null]);

  return sourceRows.map(([organRaw,sideRaw,obj],idx)=>{
    const organ=organRaw||ORDER[idx]?.[0]||'—';
    const side=sideRaw||ORDER[idx]?.[1]||'—';
    const found=obj || findResult(organ,side,results);
    const point=itemPoint(found)||'—';
    const sec=itemTime(found);
    let state=getField(found,['state','status','condition']);
    if(!state || state==='—') state=stateFromBuckets(organ,side,an);
    return {idx:idx+1,organ,side,point,sec,state};
  });
}

async function load(){
  if(!id){patientInfo.textContent='Нет ID пациента в ссылке.';diagnostics.textContent='';return}
  const p=await sb.from('patients').select('*').eq('id',id).maybeSingle();
  if(p.error){err(p.error.message);return}
  if(!p.data){patientInfo.textContent='Пациент не найден или доступ закрыт.';diagnostics.textContent='';return}
  patientInfo.innerHTML='<b>'+esc(p.data.full_name)+'</b><br>'+esc(p.data.phone||'');

  const d=await sb.from('diagnostics').select('*').eq('patient_id',id).order('created_at',{ascending:false});
  if(d.error) err(d.error.message);
  renderDiags(d.data||[]);

  const m=await sb.from('messages').select('*').eq('patient_id',id).order('created_at',{ascending:true});
  if(m.error) err(m.error.message);
  renderMsgs(m.data||[]);
}

function renderDiags(arr){
  diagnostics.innerHTML=arr.map(x=>{
    const r=x.result_json||{};
    const an=getAnalysis(r);
    const rowData=makeRows(r,an);

    const rows=rowData.map(y=>{
      const timeText=(y.sec===undefined||y.sec===null||y.sec==='')?'—':`${esc(y.sec)}с`;
      return `<tr>
        <td>${y.idx}</td>
        <td>${esc(y.organ)}</td>
        <td>${esc(y.side)}</td>
        <td>${esc(y.point)}</td>
        <td>${timeText}</td>
        <td><span class="pill ${stateClass(y.state)}">${esc(fmtState(y.state))}</span></td>
      </tr>`;
    }).join('');

    const protocol=r.protocol||r.patientProtocol||r.recommendation||r.summary||'';

    return `<div class="diag" onclick="toggleDiag(this)">
      <div class="diag-head">
        <div>
          <b>${new Date(x.created_at).toLocaleString()}</b>
          <div class="mut">${esc(r.patientName||r.patient||'Диагностика Акабане')}</div>
        </div>
        <div class="chev">⌄</div>
      </div>

      <div>
        <span class="pill red">Избыток ${an.excess.length}</span>
        <span class="pill blue">Недостаток ${an.deficiency.length}</span>
        <span class="pill green">Норма ${an.normal}</span>
      </div>

      <div class="diag-details">
        ${protocol?`<div class="section-title">Итог</div><div class="mut">${esc(protocol)}</div>`:''}
        <div class="section-title">Измерения</div>
        <table class="table">
          <tr><th>№</th><th>Меридиан</th><th>Сторона</th><th>Точка</th><th>Время</th><th>Состояние</th></tr>
          ${rows}
        </table>
      </div>
    </div>`;
  }).join('')||'Диагностик пока нет';
}

function toggleDiag(el){el.classList.toggle('open')}

function renderMsgs(arr){
  messages.innerHTML=arr.map(m=>`<div class="msg ${esc(m.author)}"><b>${m.author==='patient'?'Пациент':'Акмал'}</b><div>${esc(m.message)}</div><div class="mut">${new Date(m.created_at).toLocaleString()}</div></div>`).join('')||'<div class="mut">Сообщений пока нет</div>';
}

async function sendMsg(){
  const text=msg.value.trim(); if(!text||!id)return;
  const r=await sb.from('messages').insert({patient_id:id,author:'patient',message:text});
  if(r.error)return err(r.error.message);
  msg.value=''; load();
}

load();
</script>
</body>
</html>
