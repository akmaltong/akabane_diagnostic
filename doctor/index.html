<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Akabane Doctor</title>
<style>
body{margin:0;background:#0d0d14;color:#eee;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
.wrap{max-width:760px;margin:auto;padding:16px}.card{background:#141421;border:1px solid #292941;border-radius:18px;padding:16px;margin:12px 0}
input{width:100%;box-sizing:border-box;margin:6px 0;padding:12px;border-radius:12px;border:1px solid #33334d;background:#1b1b2a;color:#fff;font:inherit}
.btn{width:100%;padding:14px;border:0;border-radius:12px;background:#7c6af7;color:#fff;font-weight:900;margin:6px 0;font:inherit;cursor:pointer}.btn2{background:#222235;border:1px solid #33334d}.btn:disabled{opacity:.45}
.item{padding:12px;border-radius:12px;background:#1b1b2a;margin:6px 0;border:1px solid #292941}.timer{font-size:60px;text-align:center;color:#e0b852;font-weight:900}.point{text-align:center;font-size:26px;font-weight:900}.mut{color:#999}.r{color:#ff7777}.b{color:#82aaff}.g{color:#70df98}.brand{color:#e0b852;font-weight:900;letter-spacing:.08em}
</style>
</head>
<body>
<div class="wrap">
  <div class="card"><div class="brand">KUNGFU MAN · АКAБАНЕ</div><div class="mut">Рабочая версия диагностики специалиста</div></div>
  <div class="card"><h3>Пациент</h3><input id="n" placeholder="ФИО пациента"><input id="p" placeholder="Телефон"><button class="btn" onclick="addPatient()">Создать / выбрать пациента</button><div id="who" class="mut">Пациент не выбран</div></div>
  <div class="card"><button class="btn" onclick="startTest()">▶ Начать диагностику Акабане</button><button class="btn btn2" onclick="showHistory()">История</button><button class="btn btn2" onclick="clearHistory()">Очистить историю</button><div id="main"></div></div>
</div>
<script>
let cur=null,i=0,t0=0,tick=0,res=[];
const pts=['Лёгкие Л','Лёгкие П','Толстая кишка Л','Толстая кишка П','Желудок Л','Желудок П','Селезёнка Л','Селезёнка П','Сердце Л','Сердце П','Тонкая кишка Л','Тонкая кишка П','Мочевой пузырь Л','Мочевой пузырь П','Почки Л','Почки П','Перикард Л','Перикард П','Тройной обогреватель Л','Тройной обогреватель П','Жёлчный пузырь Л','Жёлчный пузырь П','Печень Л','Печень П'];
function safe(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function addPatient(){cur={name:n.value.trim()||'Без имени',phone:p.value.trim()||''};who.innerHTML='Выбран: <b>'+safe(cur.name)+'</b>'+(cur.phone?' · '+safe(cur.phone):'');main.innerHTML='<div class="item">Пациент создан. Можно начинать диагностику.</div>'}
function startTest(){if(!cur)return alert('Сначала создай пациента');i=0;res=[];screen()}
function screen(){main.innerHTML='<div class="item"><div class="mut">Измерение '+(i+1)+' из 24</div><div class="point">'+pts[i]+'</div><div id="tm" class="timer">0.0</div><button id="s" class="btn" onclick="go()">Старт</button><button id="f" class="btn btn2" onclick="feel()" disabled>Ощущение</button><button class="btn btn2" onclick="cancelTest()">Отмена</button></div>'}
function go(){t0=performance.now();s.disabled=true;f.disabled=false;tick=setInterval(()=>tm.textContent=((performance.now()-t0)/1000).toFixed(1),100)}
function feel(){clearInterval(tick);let sec=+((performance.now()-t0)/1000).toFixed(1);res.push({point:pts[i],sec,state:sec<2?'избыток':sec>4?'недостаток':'норма'});i++;i>=24?finish():screen()}
function cancelTest(){clearInterval(tick);main.innerHTML='<div class="item">Диагностика отменена.</div>'}
function finish(){let ex=res.filter(x=>x.state==='избыток'),df=res.filter(x=>x.state==='недостаток'),nm=res.filter(x=>x.state==='норма');let report={date:new Date().toISOString(),patient:cur,summary:'Избыток '+ex.length+', недостаток '+df.length+', норма '+nm.length,res};let all=JSON.parse(localStorage.akabane_reports||'[]');all.unshift(report);localStorage.akabane_reports=JSON.stringify(all);main.innerHTML='<h3>Результат</h3><p><span class="r">Избыток: '+ex.length+'</span><br><span class="b">Недостаток: '+df.length+'</span><br><span class="g">Норма: '+nm.length+'</span></p><h3>Измерения</h3>'+res.map(x=>'<div class="item">'+safe(x.point)+' — '+x.sec+'с — '+x.state+'</div>').join('')+'<button class="btn" onclick="copyReport()">Скопировать отчёт</button>'}
function showHistory(){let all=JSON.parse(localStorage.akabane_reports||'[]');main.innerHTML='<h3>История</h3>'+(all.map(x=>'<div class="item"><b>'+safe(x.patient.name)+'</b><br>'+new Date(x.date).toLocaleString()+'<br>'+safe(x.summary)+'</div>').join('')||'<div class="mut">Пусто</div>')}
function clearHistory(){if(confirm('Очистить историю?')){localStorage.removeItem('akabane_reports');showHistory()}}
function copyReport(){let text='Диагностика Акабане\nПациент: '+cur.name+'\n'+res.map(x=>x.point+' — '+x.sec+'с — '+x.state).join('\n');navigator.clipboard.writeText(text);alert('Отчёт скопирован')}
</script>
</body>
</html>
