<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Akabane · Doctor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/config.js"></script>
<style>
:root{--bg:#0d0d14;--bg2:#13131f;--bg3:#1a1a2a;--line:#2a2a40;--txt:#e8e8f0;--mut:#9090b0;--gold:#e0b852;--violet:#7c6af7;--red:#e05252;--blue:#5280e0;--green:#52c97a}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,sans-serif}.app{max-width:1180px;margin:0 auto;padding:18px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}.brand{font-weight:900;color:var(--gold);letter-spacing:.08em}.grid{display:grid;grid-template-columns:360px 1fr;gap:16px}.card{background:var(--bg2);border:1px solid var(--line);border-radius:18px;padding:16px}.title{font-size:20px;font-weight:900;margin-bottom:12px}.mut{color:var(--mut);font-size:13px;line-height:1.45}input,textarea{width:100%;background:var(--bg3);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:12px;font:inherit}textarea{min-height:92px}.btn{border:0;background:var(--violet);color:#fff;border-radius:12px;padding:12px 14px;font-weight:800;cursor:pointer}.btn2{background:var(--bg3);border:1px solid var(--line);color:var(--txt)}.btnRed{background:#3a1a1a;color:#ff7777;border:1px solid #5a2a2a}.row{display:flex;gap:8px;flex-wrap:wrap}.list{display:grid;gap:8px;margin-top:12px}.item{padding:12px;border:1px solid var(--line);background:var(--bg3);border-radius:14px;cursor:pointer}.item.active{border-color:var(--violet)}.msg{padding:10px 12px;border-radius:12px;background:var(--bg3);margin:8px 0}.msg.doctor{border-left:3px solid var(--gold)}.msg.patient{border-left:3px solid var(--violet)}.cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}.pill{display:inline-block;border-radius:10px;padding:7px 10px;margin:4px;font-weight:800;font-size:13px}.red{background:rgba(224,82,82,.18);color:#ff7777;border:1px solid rgba(224,82,82,.35)}.blue{background:rgba(82,128,224,.18);color:#82aaff;border:1px solid rgba(82,128,224,.35)}.green{background:rgba(82,201,122,.16);color:#70df98;border:1px solid rgba(82,201,122,.32)}.testbox{display:grid;gap:14px;text-align:center}.point{font-size:26px;font-weight:900}.timer{font-size:64px;font-weight:900;color:var(--gold);font-variant-numeric:tabular-nums}.bar{height:10px;background:var(--bg3);border-radius:99px;overflow:hidden;border:1px solid var(--line)}.bar>i{display:block;height:100%;background:var(--violet);width:0}.table{width:100%;border-collapse:collapse}.table td,.table th{border-bottom:1px solid var(--line);padding:9px;text-align:left}.table th{color:var(--mut);font-size:12px;text-transform:uppercase}@media(max-width:850px){.grid,.cols{grid-template-columns:1fr}.app{padding:12px}.timer{font-size:52px}}
</style>
</head>
<body>
<div class="app">
 <div class="top"><div><div class="brand">KUNGFU MAN · DOCTOR CRM</div><div class="mut">Кабинет специалиста · диагностика Акабане</div></div><a class="btn btn2" href="../patient/" target="_blank">Кабинет пациента</a></div>
 <div class="grid">
  <aside class="card"><div class="title">Пациенты</div><input id="pName" placeholder="ФИО пациента"><input id="pPhone" placeholder="Телефон" style="margin-top:8px"><button class="btn" style="width:100%;margin-top:8px" onclick="addPatient()">+ Создать пациента</button><div class="list" id="patients"></div></aside>
  <main id="work" class="card"><div class="title">Выберите пациента</div><div class="mut">Создайте пациента или выберите из списка. После этого можно запустить диагностику, сохранить результат в Supabase, открыть личную ссылку пациента и вести чат.</div></main>
 </div>
</div>
<script>
const cfg=window.APP_CONFIG||{}; const sb=window.supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);
const POINTS=[['Лёгкие','Левая','LU11'],['Лёгкие','Правая','LU11'],['Толстая кишка','Левая','LI1'],['Толстая кишка','Правая','LI1'],['Желудок','Левая','ST45'],['Желудок','Правая','ST45'],['Селезёнка/Поджелудочная','Левая','SP1'],['Селезёнка/Поджелудочная','Правая','SP1'],['Сердце','Левая','HT9'],['Сердце','Правая','HT9'],['Тонкая кишка','Левая','SI1'],['Тонкая кишка','Правая','SI1'],['Мочевой пузырь','Левая','BL67'],['Мочевой пузырь','Правая','BL67'],['Почки','Левая','KI1'],['Почки','Правая','KI1'],['Перикард','Левая','PC9'],['Перикард','Правая','PC9'],['Тройной обогреватель','Левая','TE1'],['Тройной обогреватель','Правая','TE1'],['Жёлчный пузырь','Левая','GB44'],['Жёлчный пузырь','Правая','GB44'],['Печень','Левая','LIV1'],['Печень','Правая','LIV1']];
const THERAPY={'Лёгкие':['LU9','LU5'],'Толстая кишка':['LI11','LI2'],'Желудок':['ST41','ST45'],'Селезёнка/Поджелудочная':['SP2','SP5'],'Сердце':['HT9','HT7'],'Тонкая кишка':['SI3','SI8'],'Мочевой пузырь':['BL67','BL65'],'Почки':['KI7','KI1'],'Перикард':['PC9','PC7'],'Тройной обогреватель':['TE23','TE10'],'Жёлчный пузырь':['GB43','GB38'],'Печень':['LIV8','LIV2']};
let patients=[],current=null,diagnostics=[],messages=[],test=null,tick=null;
function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
async function loadPatients(){const {data,error}=await sb.from('patients').select('*').order('created_at',{ascending:false}); if(error)return alert(error.message); patients=data||[]; renderPatients()}
function renderPatients(){patientsEl.innerHTML=patients.map(p=>`<div class="item ${current&&current.id===p.id?'active':''}" onclick="selectPatient('${p.id}')"><b>${esc(p.full_name)}</b><div class="mut">${esc(p.phone||'Без телефона')}</div></div>`).join('')||'<div class="mut">Пока нет пациентов</div>'}
async function addPatient(){const full_name=pName.value.trim(); if(!full_name)return alert('Введите ФИО'); const {data,error}=await sb.from('patients').insert({full_name,phone:pPhone.value.trim()}).select().single(); if(error)return alert(error.message); pName.value='';pPhone.value=''; await loadPatients(); selectPatient(data.id)}
async function selectPatient(id){current=patients.find(p=>p.id===id); renderPatients(); await loadPatientData(); renderWork()}
async function loadPatientData(){const [d,m]=await Promise.all([sb.from('diagnostics').select('*').eq('patient_id',current.id).order('created_at',{ascending:false}),sb.from('messages').select('*').eq('patient_id',current.id).order('created_at',{ascending:true})]); diagnostics=d.data||[]; messages=m.data||[]}
function patientLink(){return location.origin+location.pathname.replace('/doctor/','/patient/')+'?id='+current.id}
function renderWork(){work.innerHTML=`<div class="top"><div><div class="title">${esc(current.full_name)}</div><div class="mut">${esc(current.phone||'Без телефона')}</div></div><button class="btn btn2" onclick="copyLink()">Скопировать ссылку</button></div><div class="card" style="background:var(--bg3);margin-bottom:14px"><div class="mut">Личная ссылка пациента</div><div style="word-break:break-all;margin-top:6px">${patientLink()}</div></div><div class="row" style="margin-bottom:14px"><button class="btn" onclick="startDiagnostic()">▶ Начать диагностику Акабане</button><button class="btn btn2" onclick="renderManualDiag()">+ Добавить итог вручную</button></div><div class="cols"><section><div class="title">Диагностики</div><div class="list">${diagnostics.map(diagHtml).join('')||'<div class="mut">Диагностик пока нет</div>'}</div></section><section><div class="title">Чат</div><div>${messages.map(msgHtml).join('')||'<div class="mut">Сообщений пока нет</div>'}</div><textarea id="msgText" placeholder="Сообщение пациенту"></textarea><button class="btn" style="width:100%;margin-top:8px" onclick="sendMessage('doctor')">Отправить</button></section></div>`}
function diagHtml(d){let r=d.result_json||{};return `<div class="item"><b>${new Date(d.created_at).toLocaleString()}</b><div class="mut">${esc(r.summary||r.text||'Диагностика Акабане')}</div><div style="margin-top:6px">${(r.excess||[]).slice(0,4).map(x=>`<span class="pill red">↓ ${esc(x.organ)}</span>`).join('')}${(r.deficiency||[]).slice(0,4).map(x=>`<span class="pill blue">↑ ${esc(x.organ)}</span>`).join('')}</div></div>`}
function msgHtml(m){return `<div class="msg ${m.author}"><b>${m.author==='doctor'?'Акмал':'Пациент'}</b><div>${esc(m.message)}</div><div class="mut">${new Date(m.created_at).toLocaleString()}</div></div>`}
function renderManualDiag(){work.innerHTML+=`<div class="card" style="margin-top:14px"><div class="title">Добавить итог вручную</div><textarea id="diagText" placeholder='Вставь краткий итог или JSON результата'></textarea><button class="btn" style="width:100%;margin-top:8px" onclick="addDiagnosticManual()">Сохранить диагностику</button></div>`}
async function addDiagnosticManual(){let raw=diagText.value.trim(); if(!raw)return; let result_json; try{result_json=JSON.parse(raw)}catch{result_json={text:raw,summary:raw}} await saveDiagnostic(result_json)}
async function sendMessage(author){const t=msgText.value.trim(); if(!t)return; const {error}=await sb.from('messages').insert({patient_id:current.id,author,message:t}); if(error)return alert(error.message); await loadPatientData(); renderWork()}
function copyLink(){navigator.clipboard.writeText(patientLink()); alert('Ссылка скопирована')}
function startDiagnostic(){test={i:0,results:[],started:null,running:false}; renderTest()}
function renderTest(){const p=POINTS[test.i]; work.innerHTML=`<div class="testbox"><div class="mut">Пациент: ${esc(current.full_name)} · ${test.i+1}/24</div><div class="bar"><i style="width:${(test.i/24)*100}%"></i></div><div class="card"><div class="mut">Диагностическая точка</div><div class="point">${p[2]} · ${esc(p[0])}</div><div class="mut">${p[1]} сторона</div><div class="timer" id="timer">0.0</div><div class="row" style="justify-content:center"><button class="btn" id="startBtn" onclick="startPoint()">Старт</button><button class="btn btn2" id="feelBtn" onclick="feelPoint()" disabled>Ощущение</button><button class="btn btnRed" onclick="cancelDiagnostic()">Отмена</button></div></div><div class="mut">Нажми «Старт», прогревай точку. Когда пациент почувствует тепло/ощущение — нажми «Ощущение».</div></div>`}
function startPoint(){test.started=performance.now();test.running=true;startBtn.disabled=true;feelBtn.disabled=false;tick=setInterval(()=>{timer.textContent=((performance.now()-test.started)/1000).toFixed(1)},100)}
function feelPoint(){clearInterval(tick);const sec=Number(((performance.now()-test.started)/1000).toFixed(1));const p=POINTS[test.i];test.results.push({organ:p[0],side:p[1],point:p[2],seconds:sec,state:sec<2?'excess':sec>4?'deficiency':'normal'});test.i++; if(test.i>=POINTS.length) finishDiagnostic(); else renderTest()}
function cancelDiagnostic(){clearInterval(tick);renderWork()}
function analyse(results){let excess=results.filter(x=>x.state==='excess'),deficiency=results.filter(x=>x.state==='deficiency'),normal=results.filter(x=>x.state==='normal');let sedation=excess.map(x=>({...x,treat:(THERAPY[x.organ]||[])[1]}));let tonify=deficiency.map(x=>({...x,treat:(THERAPY[x.organ]||[])[0]}));return {type:'akabane',patient:current.full_name,created_at:new Date().toISOString(),summary:`Акабане: избыток ${excess.length}, недостаток ${deficiency.length}, норма ${normal.length}`,results,excess,deficiency,normal,sedation,tonify}}
function finishDiagnostic(){const report=analyse(test.results); work.innerHTML=`<div class="title">Результат диагностики</div><div>${report.excess.map(x=>`<span class="pill red">↓ ${esc(x.organ)} ${x.side}</span>`).join('')}${report.deficiency.map(x=>`<span class="pill blue">↑ ${esc(x.organ)} ${x.side}</span>`).join('')}${report.normal.map(x=>`<span class="pill green">✓ ${esc(x.organ)} ${x.side}</span>`).join('')}</div><div class="card" style="margin-top:14px;background:var(--bg3)"><b>Протокол</b><div class="mut" style="margin-top:8px">Седация: ${report.sedation.map(x=>x.treat).filter(Boolean).join(', ')||'—'}</div><div class="mut">Тонизация: ${report.tonify.map(x=>x.treat).filter(Boolean).join(', ')||'—'}</div></div><table class="table" style="margin-top:14px"><tr><th>Меридиан</th><th>Сторона</th><th>Время</th><th>Состояние</th></tr>${report.results.map(x=>`<tr><td>${esc(x.organ)}</td><td>${x.side}</td><td>${x.seconds}с</td><td>${x.state}</td></tr>`).join('')}</table><button class="btn" style="width:100%;margin-top:14px" onclick='saveDiagnostic(${JSON.stringify(report).replace(/'/g,"&apos;")})'>Сохранить в базу</button><button class="btn btn2" style="width:100%;margin-top:8px" onclick="renderWork()">Назад</button>`}
async function saveDiagnostic(result_json){const {error}=await sb.from('diagnostics').insert({patient_id:current.id,result_json}); if(error)return alert(error.message); await loadPatientData(); renderWork(); alert('Диагностика сохранена')}
loadPatients();
</script>
</body>
</html>
