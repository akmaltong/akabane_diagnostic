<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KUNGFU MAN · Akabane</title>
<style>
:root{
  --bg:#09090d;
  --card:#13131f;
  --card2:#171724;
  --line:#2a2a40;
  --gold:#e0b852;
  --gold2:#9b7430;
  --text:#f2f2f6;
  --mut:#a9a9c8;
  --violet:#7c6af7;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top,rgba(224,184,82,.08),transparent 38%),
    var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
}

.app{
  width:min(980px,94vw);
  padding:28px 0;
}

.hero-brand{
  height:320px;
  border:1px solid rgba(224,184,82,.42);
  border-radius:28px;
  background:
    radial-gradient(circle at center,rgba(224,184,82,.12),transparent 52%),
    #050507;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  box-shadow:0 34px 90px rgba(0,0,0,.55);
  margin-bottom:22px;
}

.hero-brand img{
  width:760px;
  max-width:92%;
  height:auto;
  display:block;
  transform:translateY(-18px);
  filter:drop-shadow(0 0 22px rgba(224,184,82,.16));
}

.card{
  background:linear-gradient(180deg,var(--card),#10101a);
  border:1px solid var(--line);
  border-radius:24px;
  padding:26px;
}

.brand{
  color:var(--gold);
  font-weight:900;
  letter-spacing:.12em;
  font-size:15px;
}

h1{
  font-size:38px;
  line-height:1.05;
  margin:12px 0 12px;
  font-weight:950;
  letter-spacing:-.03em;
}

p{
  color:var(--mut);
  line-height:1.6;
  margin:0 0 22px;
  max-width:760px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}

a{
  display:block;
  text-align:center;
  text-decoration:none;
  color:white;
  background:var(--violet);
  border-radius:15px;
  padding:16px;
  font-weight:900;
  border:1px solid transparent;
}

a.secondary{
  background:#1a1a2a;
  border-color:var(--line);
}

@media(max-width:700px){
  body{align-items:flex-start}
  .app{padding:16px 0}
  .hero-brand{height:230px;border-radius:22px}
  .hero-brand img{width:620px;max-width:115%;transform:translateY(-10px)}
  .card{padding:20px;border-radius:20px}
  h1{font-size:30px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">

  <div class="hero-brand">
    <img src="assets/kungfuman-logo.jpg" alt="KUNGFU MAN">
  </div>

  <div class="card">
    <div class="brand">KUNGFU MAN · AKABANE</div>
    <h1>Диагностика Акабане</h1>
    <p>Кабинет специалиста, диагностика, личный кабинет пациента, результаты, рекомендации и связь с врачом.</p>

    <div class="grid">
      <a href="crm/">CRM</a>
      <a class="secondary" href="doctor/">Диагностика</a>
      <a class="secondary" href="patient/">Кабинет пациента</a>
    </div>
  </div>

</div>
</body>
</html>
