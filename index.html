<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KUNGFU MAN · Akabane</title>
<style>
body{margin:0;min-height:100vh;background:#09090d;color:#e8e8f0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;display:flex;align-items:center;justify-content:center}
.app{width:min(920px,92vw);padding:28px}
.logo{width:100%;max-height:420px;object-fit:cover;object-position:top center;border-radius:24px;border:1px solid rgba(224,184,82,.28);box-shadow:0 30px 90px rgba(0,0,0,.55)}
.card{background:#13131f;border:1px solid #2a2a40;border-radius:22px;padding:24px;margin-top:18px}
.brand{color:#e0b852;font-weight:900;letter-spacing:.12em}
h1{font-size:34px;line-height:1.05;margin:10px 0 12px}
p{color:#a9a9c8;line-height:1.55;margin:0 0 18px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
a{display:block;text-align:center;text-decoration:none;color:white;background:#7c6af7;border-radius:14px;padding:15px;font-weight:900}
a.secondary{background:#1a1a2a;border:1px solid #2a2a40}
@media(max-width:650px){.grid{grid-template-columns:1fr}h1{font-size:28px}.app{padding:14px}}
</style>
</head>
<body>
<div class="app">
  <img class="logo" src="assets/kungfu-man-logo.jpg" alt="KUNGFU MAN">
  <div class="card">
    <div class="brand">KUNGFU MAN · AKABANE</div>
    <h1>Диагностика Акабане</h1>
    <p>Кабинет специалиста, личный кабинет пациента, результаты диагностики, рекомендации и связь с врачом.</p>
    <div class="grid">
      <a href="crm/">Открыть CRM</a>
      <a class="secondary" href="patient/">Кабинет пациента</a>
    </div>
  </div>
</div>
</body>
</html>
