<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Akabane CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;background:#0d0d14;color:#e8e8f0;font-family:system-ui,-apple-system,Segoe UI,sans-serif}.app{max-width:900px;margin:auto;padding:18px}.card{background:#13131f;border:1px solid #2a2a40;border-radius:20px;padding:18px;margin:14px 0}.brand{color:#e0b852;font-weight:900;letter-spacing:.08em}.title{font-size:24px;font-weight:900;margin:8px 0}.mut{color:#9696b8;line-height:1.5}input,textarea{width:100%;box-sizing:border-box;background:#1a1a2a;border:1px solid #2a2a40;border-radius:14px;color:#fff;padding:13px;margin-top:8px;font:inherit}textarea{min-height:82px}.btn{display:block;width:100%;box-sizing:border-box;text-align:center;background:#7c6af7;color:white;border:0;border-radius:14px;padding:14px;margin-top:10px;font-weight:900;text-decoration:none;cursor:pointer}.btn2{background:#1a1a2a;border:1px solid #2a2a40}.btnRed{background:#331616;border:1px solid #693030;color:#ff9b9b}.patient{padding:14px;border-radius:16px;background:#1a1a2a;border:1px solid #2a2a40;margin-top:10px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.small{font-size:13px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.badge{background:#23233a;border:1px solid #343452;border-radius:999px;padding:6px 10px;color:#bdbdff;font-size:12px}.err{background:#351515;border:1px solid #743030;color:#ff9b9b;border-radius:12px;padding:10px;margin:10px 0;white-space:pre-wrap}@media(max-width:650px){.row{grid-template-columns:1fr}.top{display:block}}
</style>
</head>
<body>
<div class="app">
  <div class="card"><div class="brand">KUNGFU MAN · AKABANE CRM</div><div class="title">Пациенты</div><div class="mut">Облачная база Supabase. Пациента можно открыть с любого устройства по личной ссылке.</div><div id="status"></div></div>
  <div class="card"><div class="title">Новый пациент</div><input id="name" placeholder="ФИО пациента"><input id="phone" placeholder="Телефон"><textarea id="note" placeholder="Заметки: жалобы, дата визита, состояние"></textarea><button class="btn" onclick="savePatient()">+ Сохранить пациента</button></div>
  <div class="card"><div class="top"><div class="title">Список пациентов</div><span class="badge" id="count">0 пациентов</span></div><div id="list" class="mut">Загрузка...</div></div>
</div>
<script>
const SUPABASE_URL='https://ytalluctuccinghqaotw.supabase.co';
const SUPABASE_KEY='sb_publishable_1rbvxxVRGzBVOYUKbMku4w_jEo8dQxd';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function err(s){status.innerHTML='<div class="err">'+esc(s)+'</div>'}
function localPatients(){try{return JSON.parse(localStorage.getItem('akabane_patients')||'[]')}catch{return[]}}
function saveLocalPatients(a){localStorage.setItem('akabane_patients',JSON.stringify(a))}
async function syncLocalToCloud(){
  const local=localPatients();
  for(const p of local){
    if(!p.name) continue;
    const found=await sb.from('patients').select('id').eq('full_name',p.name).limit(1).maybeSingle();
    if(found.data){p.id=found.data.id;continue}
    const ins=await sb.from('patients').insert({full_name:p.name,phone:p.phone||''}).select().single();
    if(ins.data)p.id=ins.data.id;
  }
  saveLocalPatients(local);
}
async function load(){
  status.innerHTML='';
  try{
    await syncLocalToCloud();
    const r=await sb.from('patients').select('*').order('created_at',{ascending:false});
    if(r.error) throw r.error;
    render(r.data||[]);
  }catch(e){err('Ошибка Supabase: '+(e.message||e)); render(localPatients().map(p=>({id:p.id,full_name:p.name,phone:p.phone,created_at:p.createdAt})))}
}
function render(arr){
  count.textContent=arr.length+' пациентов';
  list.innerHTML=arr.map(p=>{
    const name=p.full_name||p.name||'Без имени';
    const phone=p.phone||'Без телефона';
    const created=p.created_at||p.createdAt;
    const doctor='../doctor/?patient='+encodeURIComponent(p.id)+'&name='+encodeURIComponent(name);
    const patient='../patient/?id='+encodeURIComponent(p.id);
    return `<div class="patient"><div class="top"><div><b>${esc(name)}</b><div class="mut small">${esc(phone)} · ${created?new Date(created).toLocaleString():'без даты'}</div></div><span class="badge">ID ${esc((p.id||'').slice(0,8))}</span></div><div class="row"><a class="btn" href="${doctor}">▶ Запустить диагностику</a><a class="btn btn2" href="${patient}" target="_blank">Открыть кабинет</a></div><button class="btn btn2" onclick="copyLink('${p.id}')">Скопировать ссылку пациенту</button></div>`
  }).join('')||'Пока нет пациентов';
}
async function savePatient(){
  const n=name.value.trim(); if(!n)return alert('Введите ФИО');
  const r=await sb.from('patients').insert({full_name:n,phone:phone.value.trim()}).select().single();
  if(r.error)return err(r.error.message);
  const local=localPatients(); local.unshift({id:r.data.id,name:r.data.full_name,phone:r.data.phone,createdAt:r.data.created_at}); saveLocalPatients(local);
  name.value='';phone.value='';note.value='';load();
}
function copyLink(id){
  const link=location.origin+location.pathname.replace('/crm/','/patient/')+'?id='+encodeURIComponent(id);
  navigator.clipboard.writeText(link); alert('Ссылка скопирована:\\n'+link);
}
load();
</script>
</body></html>
