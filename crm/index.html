<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Akabane CRM</title>
<style>
body{margin:0;background:#0d0d14;color:#e8e8f0;font-family:system-ui,-apple-system,Segoe UI,sans-serif}.app{max-width:760px;margin:auto;padding:18px}.card{background:#13131f;border:1px solid #2a2a40;border-radius:20px;padding:18px;margin:14px 0}.brand{color:#e0b852;font-weight:900;letter-spacing:.08em}.title{font-size:24px;font-weight:900;margin:8px 0}.mut{color:#9696b8;line-height:1.5}input,textarea{width:100%;box-sizing:border-box;background:#1a1a2a;border:1px solid #2a2a40;border-radius:14px;color:#fff;padding:13px;margin-top:8px;font:inherit}.btn{display:block;width:100%;box-sizing:border-box;text-align:center;background:#7c6af7;color:white;border:0;border-radius:14px;padding:14px;margin-top:10px;font-weight:900;text-decoration:none;cursor:pointer}.btn2{background:#1a1a2a;border:1px solid #2a2a40}.patient{padding:14px;border-radius:14px;background:#1a1a2a;border:1px solid #2a2a40;margin-top:10px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:650px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
 <div class="card">
  <div class="brand">KUNGFU MAN · CRM</div>
  <div class="title">Карточка пациента</div>
  <div class="mut">Эта страница не трогает рабочую диагностику. Она только хранит пациента и открывает диагностику в отдельном разделе.</div>
 </div>
 <div class="card">
  <input id="name" placeholder="ФИО пациента">
  <input id="phone" placeholder="Телефон">
  <textarea id="note" placeholder="Заметки"></textarea>
  <button class="btn" onclick="savePatient()">+ Сохранить пациента</button>
 </div>
 <div class="card">
  <div class="title">Пациенты</div>
  <div id="list" class="mut">Пока нет пациентов</div>
 </div>
</div>
<script>
const KEY='akabane_crm_patients';let selected=null;function db(){return JSON.parse(localStorage.getItem(KEY)||'[]')}function put(x){localStorage.setItem(KEY,JSON.stringify(x))}function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function uid(){return crypto.randomUUID?crypto.randomUUID():'p_'+Date.now()}function savePatient(){let n=name.value.trim();if(!n)return alert('Введите ФИО');let arr=db();let p={id:uid(),name:n,phone:phone.value.trim(),note:note.value.trim(),createdAt:new Date().toISOString()};arr.unshift(p);put(arr);name.value='';phone.value='';note.value='';render()}function render(){let arr=db();list.innerHTML=arr.map(p=>`<div class="patient"><b>${esc(p.name)}</b><div class="mut">${esc(p.phone||'Без телефона')}</div><div class="mut">${esc(p.note||'')}</div><div class="row"><a class="btn" href="../doctor/?patient=${encodeURIComponent(p.id)}&name=${encodeURIComponent(p.name)}">Запустить диагностику</a><a class="btn btn2" href="../patient/?id=${encodeURIComponent(p.id)}">Кабинет пациента</a></div></div>`).join('')||'Пока нет пациентов'}render();
</script>
</body>
</html>
